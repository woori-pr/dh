<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 미리보기 · 인터넷끝판왕 영업팀용</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F6F9; --card:#FFFFFF; --ink:#14161B; --muted:#697586;
    --line:#E5E8EE; --line-soft:#EEF1F5;
    --accent:#2F6FED; --accent-soft:#EAF1FE;
    --benefit-bg:#FFF6E5; --benefit-line:#FFDD99; --benefit-ink:#7A4A00;
    --live:#12A150; --live-bg:#E7F7EE;
    --ended:#98A2B3; --ended-bg:#F1F3F6;
    --yt:#FF3B30; --ig:#E1306C; --toss:#0064FF; --etc:#5B6472;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.06);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:0 20px 80px;}

  /* Header */
  header{
    position:sticky; top:0; z-index:40; background:rgba(244,246,249,.86);
    backdrop-filter:saturate(1.4) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .head-in{max-width:1180px; margin:0 auto; padding:16px 20px 14px;
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
  .brand{display:flex; flex-direction:column; gap:1px;}
  .brand .mark{font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:21px; letter-spacing:-.02em; line-height:1.05;}
  .brand .mark span{color:var(--accent);}
  .brand .sub{font-size:12px; color:var(--muted); letter-spacing:.01em;
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .search{flex:1; min-width:200px; position:relative;}
  .search input{
    width:100%; border:1px solid var(--line); background:var(--card);
    border-radius:12px; padding:11px 14px 11px 40px; font-size:14px; color:var(--ink);
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  .search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted);}
  .edit-toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);font-weight:600;font-size:13.5px;font-family:inherit;
    padding:10px 14px;border-radius:12px;cursor:pointer;transition:all .14s;white-space:nowrap;}
  .edit-toggle:hover{border-color:#D5DAE2;color:var(--ink);}
  .edit-toggle.on{background:var(--live-bg);border-color:#B7E4C7;color:var(--live);}
  .sync{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;
    background:var(--line-soft);color:var(--muted);white-space:nowrap;}
  .sync.ok{background:var(--live-bg);color:var(--live);}
  .sync.err{background:#FEF3F2;color:#D92D20;}
  .sync.demo{background:#FFF6E5;color:#8a6100;}
  .live-count{display:none;align-items:center;gap:5px;font-size:10.5px;font-weight:700;
    padding:2px 8px;border-radius:999px;background:var(--live-bg);color:var(--live);white-space:nowrap;}
  .live-count.on{display:inline-flex;}
  .live-count .pulse{width:6px;height:6px;border-radius:50%;background:currentColor;
    animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.8);}}
  .btn-add{
    display:inline-flex; align-items:center; gap:7px; border:none; cursor:pointer;
    background:var(--ink); color:#fff; font-weight:600; font-size:14px;
    padding:11px 16px; border-radius:12px; transition:transform .12s, opacity .15s;
    font-family:inherit;
  }
  .btn-add:hover{opacity:.9; transform:translateY(-1px);}
  .btn-add svg{width:16px;height:16px;}

  /* Filter bar */
  .filters{display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:18px 0 20px;}
  .chip{
    display:inline-flex; align-items:center; gap:7px; cursor:pointer;
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:8px 14px; border-radius:999px; font-size:13.5px; font-weight:600;
    transition:all .14s; font-family:inherit; user-select:none;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.9;}
  .chip .cnt{font-variant-numeric:tabular-nums; font-weight:600; opacity:.7;
    font-size:12px; background:var(--line-soft); padding:1px 7px; border-radius:999px;}
  .chip:hover{border-color:#D5DAE2;}
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .chip.on .cnt{background:rgba(255,255,255,.18); color:#fff;}
  .chip-manage{color:var(--accent); border-style:dashed; border-color:#C9D6F5; background:transparent;}
  .chip-manage:hover{background:var(--accent-soft); border-color:var(--accent);}
  .live-toggle{margin-left:auto; display:inline-flex; align-items:center; gap:8px;
    font-size:13.5px; color:var(--muted); cursor:pointer; user-select:none; font-weight:600;}
  .switch{width:38px;height:22px;border-radius:999px;background:var(--line);
    position:relative; transition:background .16s; flex:none;}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;
    border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:transform .16s;}
  .live-toggle.on .switch{background:var(--live);}
  .live-toggle.on .switch::after{transform:translateX(16px);}

  /* Grid */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column;
    transition:transform .14s, box-shadow .14s;
  }
  .card:hover{transform:translateY(-2px); box-shadow:0 2px 4px rgba(16,24,40,.05),0 14px 34px rgba(16,24,40,.09);}
  .preview{position:relative; aspect-ratio:16/10; background:#0e1116; overflow:hidden;}
  .preview img.thumb{width:100%;height:100%;object-fit:cover;display:block;}
  .preview img.zoomable{cursor:zoom-in;}
  .zoom-hint{position:absolute;bottom:10px;right:10px;z-index:2;display:inline-flex;align-items:center;gap:5px;
    font-size:11px;font-weight:700;color:#fff;background:rgba(20,22,27,.72);padding:5px 9px;border-radius:8px;
    cursor:zoom-in;backdrop-filter:blur(2px);transition:background .14s;}
  .zoom-hint:hover{background:rgba(20,22,27,.9);}
  .zoom-hint svg{width:13px;height:13px;}
  .imgview{position:fixed;inset:0;background:rgba(8,10,14,.92);z-index:90;display:none;
    align-items:center;justify-content:center;padding:24px;cursor:zoom-out;}
  .imgview.open{display:flex;}
  .imgview img{max-width:100%;max-height:100%;object-fit:contain;border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .imgview .close{position:fixed;top:16px;right:18px;color:#fff;background:rgba(255,255,255,.14);
    border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;
    align-items:center;justify-content:center;z-index:2;}
  .imgview .close svg{width:20px;height:20px;}
  .imgview .navbtn{position:fixed;top:50%;transform:translateY(-50%);color:#fff;
    background:rgba(255,255,255,.14);border:none;width:46px;height:46px;border-radius:50%;
    cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .14s;}
  .imgview .navbtn:hover{background:rgba(255,255,255,.28);}
  .imgview .navbtn svg{width:24px;height:24px;}
  .imgview .prev{left:18px;} .imgview .next{right:18px;}
  .imgcounter{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);color:#fff;
    background:rgba(20,22,27,.7);padding:6px 14px;border-radius:999px;font-size:13px;font-weight:700;
    font-variant-numeric:tabular-nums;z-index:2;}
  .preview iframe{width:100%;height:100%;border:0;display:block;}
  .preview .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    color:#5b6472;font-size:13px;background:linear-gradient(135deg,#1a1f27,#0e1116);}
  .play{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    cursor:pointer; background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.35));}
  .play .circle{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.94);
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.35);
    transition:transform .14s;}
  .play:hover .circle{transform:scale(1.07);}
  .play .circle svg{width:22px;height:22px;color:var(--yt);margin-left:3px;}

  .badges{position:absolute; top:10px; left:10px; display:flex; gap:6px; z-index:2;}
  .ch-badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    color:#fff;padding:4px 9px;border-radius:999px;letter-spacing:.01em;
    box-shadow:0 1px 4px rgba(0,0,0,.25);}
  .status{position:absolute; top:10px; right:10px; z-index:2; font-size:11px; font-weight:700;
    padding:4px 9px; border-radius:999px; letter-spacing:.02em;}
  .status.live{background:var(--live-bg); color:var(--live);}
  .status.ended{background:rgba(255,255,255,.9); color:var(--ended);}

  .body{padding:15px 16px 16px; display:flex; flex-direction:column; gap:11px; flex:1;}
  .src{font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.01em;}
  .title{font-size:16px; font-weight:700; letter-spacing:-.01em; line-height:1.3; word-break:keep-all;}
  .benefit{
    background:var(--benefit-bg); border:1px solid var(--benefit-line); border-radius:11px;
    padding:10px 12px; color:var(--benefit-ink); font-size:13.5px; line-height:1.45;
    white-space:pre-wrap; word-break:keep-all;
  }
  .benefit .lbl{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:800;
    letter-spacing:.06em;opacity:.75;margin-bottom:4px;text-transform:uppercase;}
  .benefit .txt{font-weight:600;}
  .meta{margin-top:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding-top:3px; font-size:12.5px; color:var(--muted);}
  .meta .period{font-variant-numeric:tabular-nums;}
  .phoneline{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
    font-size:13.5px;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:.01em;
    background:var(--line-soft);padding:6px 11px;border-radius:9px;font-variant-numeric:tabular-nums;
    transition:background .14s;}
  .phoneline:hover{background:#E6EAF0;}
  .phoneline svg{width:14px;height:14px;color:var(--accent);}
  .memo{font-size:12.5px;color:var(--muted);line-height:1.5;word-break:keep-all;
    border-top:1px dashed var(--line);padding-top:9px;}
  .links{display:flex; gap:8px; flex-wrap:wrap;}
  .lk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;
    text-decoration:none;color:var(--accent);background:var(--accent-soft);
    padding:6px 11px;border-radius:9px;transition:filter .14s;}
  .lk:hover{filter:brightness(.96);}
  .lk.grey{color:var(--muted);background:var(--line-soft);}
  .row-actions{display:flex;gap:6px;margin-left:auto;}
  .icon-btn.pin.on{color:var(--accent);background:var(--accent-soft);}
  .pin-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
    color:var(--ink);background:rgba(255,255,255,.92);padding:4px 8px;border-radius:999px;
    box-shadow:0 1px 4px rgba(0,0,0,.22);}
  .card.pinned{border-color:#C9D6F5;box-shadow:0 0 0 2px var(--accent-soft),var(--shadow);}
  .icon-btn{border:none;background:transparent;cursor:pointer;color:var(--muted);
    width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
    transition:background .14s,color .14s;}
  .icon-btn:hover{background:var(--line-soft);color:var(--ink);}
  .icon-btn svg{width:16px;height:16px;}

  /* Empty */
  .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted);}
  .empty .big{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:6px;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(16,20,28,.44);z-index:60;
    display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;
    backdrop-filter:blur(2px);}
  .overlay.open{display:flex;}
  .modal{background:var(--card);border-radius:20px;width:100%;max-width:520px;
    box-shadow:0 24px 60px rgba(16,24,40,.28);overflow:hidden;animation:pop .18s ease;}
  .modal.narrow{max-width:420px;}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.99);}to{opacity:1;transform:none;}}
  .modal h2{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em;}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line-soft);
    display:flex;align-items:center;gap:10px;}
  .modal-head .x{margin-left:auto;}
  .modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px;
    max-height:min(64vh,620px);overflow:auto;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12.5px;font-weight:700;color:var(--ink);letter-spacing:.01em;}
  .field .hint{font-size:11.5px;color:var(--muted);font-weight:500;}
  .field input[type=text],.field input[type=date],.field input[type=password],.field textarea,.field select{
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;
    font-family:inherit;color:var(--ink);outline:none;background:#fff;transition:border-color .14s,box-shadow .14s;}
  .field input:focus,.field textarea:focus,.field select:focus{
    border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .field input:disabled{background:var(--line-soft);color:var(--muted);cursor:not-allowed;}
  .field textarea{resize:vertical;min-height:64px;line-height:1.5;}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .seg button{flex:1;min-width:72px;border:1px solid var(--line);background:#fff;border-radius:10px;
    padding:9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;
    transition:all .14s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .seg button .cdot{width:8px;height:8px;border-radius:50%;}
  .seg button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .imgthumbs{display:flex;flex-wrap:wrap;gap:8px;}
  .imgthumb{position:relative;width:82px;height:82px;border-radius:9px;overflow:hidden;border:1px solid var(--line);}
  .imgthumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .imgdel{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;border:none;
    background:rgba(16,20,28,.66);color:#fff;cursor:pointer;font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;}
  .imgdel:hover{background:#D92D20;}
  .imgadd{width:82px;height:82px;border-radius:9px;border:1.5px dashed var(--line);background:transparent;
    cursor:pointer;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;font-size:20px;font-family:inherit;transition:all .14s;}
  .imgadd span{font-size:11px;font-weight:600;}
  .imgadd:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line-soft);display:flex;gap:10px;}
  .modal-foot button{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;border:1px solid var(--line);}
  .btn-cancel{background:#fff;color:var(--muted);}
  .btn-cancel:hover{background:var(--line-soft);}
  .btn-save{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn-save:hover{opacity:.92;}
  .btn-del{background:#fff;color:#D92D20;border-color:#FCCFCB;flex:none;padding:12px 16px;}
  .btn-del:hover{background:#FEF3F2;}

  /* Channel manager */
  .ch-list{display:flex;flex-direction:column;gap:8px;}
  .ch-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line-soft);
    border-radius:11px;padding:9px 12px;}
  .ch-row .cdot{width:12px;height:12px;border-radius:50%;flex:none;}
  .ch-row .nm{font-size:14px;font-weight:600;}
  .ch-row .tag{font-size:11px;color:var(--muted);background:var(--line-soft);
    padding:2px 8px;border-radius:999px;font-weight:600;}
  .ch-row .usecnt{font-size:11.5px;color:var(--muted);margin-left:auto;font-weight:600;}
  .ch-row .del{border:none;background:transparent;cursor:pointer;color:#98A2B3;
    width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;}
  .ch-row .del:hover{background:#FEF3F2;color:#D92D20;}
  .ch-row .del svg{width:15px;height:15px;}
  .addch{border-top:1px solid var(--line-soft);margin-top:6px;padding-top:16px;
    display:flex;flex-direction:column;gap:10px;}
  .addch .row1{display:flex;gap:10px;}
  .addch input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    font-size:14px;font-family:inherit;outline:none;}
  .addch input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .addch .add-btn{border:none;background:var(--ink);color:#fff;font-weight:700;font-size:13.5px;
    padding:0 16px;border-radius:10px;cursor:pointer;font-family:inherit;}
  .addch .add-btn:hover{opacity:.9;}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;
    transition:transform .12s;}
  .swatch:hover{transform:scale(1.12);}
  .swatch.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:600;
    z-index:80;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 10px 30px rgba(0,0,0,.25);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* View/Edit gating: 편집 모드일 때만 편집 UI 노출 */
  .btn-add{display:none;}
  body.is-editor .btn-add{display:inline-flex;}
  .chip-manage{display:none;}
  body.is-editor .chip-manage{display:inline-flex;}
  .row-actions{display:none !important;}
  body.is-editor .row-actions{display:flex !important;}

  @media (max-width:640px){
    .head-in{gap:12px;}
    .brand .mark{font-size:19px;}
    .btn-add span{display:none;}
    .btn-add{padding:11px 12px;}
    .live-toggle{margin-left:0;}
    .grid{grid-template-columns:1fr;}
    .two{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="brand">
      <div class="mark">광고 <span>미리보기</span></div>
      <div class="sub">인터넷끝판왕 · 영업팀 상담 참고용 <span class="sync" id="syncBadge"></span><span class="live-count" id="presenceBadge"></span></div>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="채널명, 경로, 혜택, 대표번호로 검색…" autocomplete="off">
    </div>
    <button class="edit-toggle" id="editBtn" onclick="onEditBtn()">🔓 편집</button>
    <button class="btn-add" onclick="openForm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span>광고 추가</span>
    </button>
  </div>
</header>

<div class="wrap">
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Ad Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">광고 추가</h2>
      <button class="icon-btn x" onclick="closeForm()">

<script>
/* ---------- Defaults ---------- */
var DEFAULT_CHANNELS = [
  {key:'youtube',  name:'유튜브',    color:'#FF3B30', fixed:true},
  {key:'instagram',name:'인스타그램', color:'#E1306C', fixed:true},
  {key:'toss',     name:'토스',      color:'#0064FF', fixed:true},
  {key:'etc',      name:'기타',      color:'#5B6472', fixed:true}
];
var SWATCH_COLORS = ['#FF3B30','#E1306C','#0064FF','#12A150','#F79009','#7A5AF8','#06AED4','#EC4A0A','#D444F1','#F63D68','#0BA5EC','#475467'];

var DB = { channels: DEFAULT_CHANNELS.map(function(c){return Object.assign({},c);}), ads: [] };
function chMeta(k){ return DB.channels.find(function(c){return c.key===k;}) || {key:k,name:k,color:'#5B6472'}; }

/* 데모 시드(파이어베이스 연결 전에만 사용) */
var SAMPLE = [
  {id:'s1', channel:'youtube', title:'유튜브-PPL', src:'자취남 채널', phone:'1600-1234', yt:'https://youtu.be/dQw4w9WgXcQ',
   img:'', benefit:'현금 최대 30만원\n+ 상품권 3만원 + 공유기 무료', start:'2026-06-01', end:'', status:'live',
   link1:'', link2:'', memo:'', sample:true},
  {id:'s2', channel:'instagram', title:'인스타-신청서', src:'자사 랜딩 연결', phone:'1600-5678', yt:'',
   img:'', benefit:'가입 시 사은품 택1\n(에어프라이어 / 상품권 5만원)', start:'2026-06-15', end:'', status:'live',
   link1:'', link2:'', memo:'인스타 신청서로 들어온 인입은 랜딩과 혜택 다름 주의', sample:true},
  {id:'s3', channel:'toss', title:'토스-배너', src:'토스 앱 내 노출', phone:'1600-0000', yt:'',
   img:'', benefit:'제휴카드 결합 시 월 요금 추가 할인', start:'2026-05-01', end:'2026-05-31', status:'ended',
   link1:'', link2:'', memo:'', sample:true}
];

/* ---------- State ---------- */
var activeCh = 'all';
var liveOnly = false;
var editingId = null;
var formCh = 'youtube';
var formStatus = 'live';
var formImgs = [];
var galleryImgs = [], galleryIdx = 0;
var newChColor = SWATCH_COLORS[3];
var isEditor = false;

/* ---------- YouTube helpers ---------- */
function ytId(url){
  if(!url) return '';
  var m = url.match(/(?:youtu\.be\/|watch\?v=|\/embed\/|\/shorts\/|\/v\/)([\w-]{11})/);
  if(m) return m[1];
  var bare = url.trim().match(/^[\w-]{11}$/);
  return bare ? bare[0] : '';
}
function ytThumb(id){ return 'https://img.youtube.com/vi/'+id+'/hqdefault.jpg'; }

/* ---------- Date helpers ---------- */
function fmtMD(iso){ if(!iso) return ''; var p=iso.split('-'); if(p.length<3) return iso; return (+p[1])+'/'+(+p[2]); }
function periodStr(start,end,status){
  var s=fmtMD(start);
  var e = status==='live' ? '진행중' : fmtMD(end);
  if(!s && (!e || e==='진행중')) return status==='live' ? '진행중' : '';
  if(!s) return e;
  if(!e) return s+' ~';
  return s+' ~ '+e;
}

/* ---------- Image compress (Firestore 용량 절약) ---------- */
function fileToImg(file, cb){
  var r=new FileReader();
  r.onload=function(){
    var img=new Image();
    img.onload=function(){
      try{
        var max=1280, w=img.width, h=img.height;
        if(w>max||h>max){ var s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        cb(c.toDataURL('image/jpeg',0.72));
      }catch(e){ cb(r.result); }
    };
    img.onerror=function(){ cb(r.result); };
    img.src=r.result;
  };
  r.readAsDataURL(file);
}

/* ---------- Render filters ---------- */
function counts(){
  var c = {all:0}; DB.channels.forEach(function(ch){c[ch.key]=0;});
  DB.ads.forEach(function(a){ c.all++; if(c[a.channel]!==undefined) c[a.channel]++; });
  return c;
}
function renderFilters(){
  var c = counts();
  var el = document.getElementById('filters');
  var html = chipHtml('all','전체','',c.all,'var(--ink)');
  DB.channels.forEach(function(ch){ html += chipHtml(ch.key, ch.name, 'dot', c[ch.key]||0, ch.color); });
  html += '<button class="chip chip-manage" onclick="openChannels()">＋ 채널</button>';
  html += '<label class="live-toggle'+(liveOnly?' on':'')+'" onclick="toggleLive()">'+
      '<span class="switch"></span>진행중만</label>';
  el.innerHTML = html;
}
function chipHtml(key,name,dot,cnt,color){
  var on = activeCh===key;
  var dotHtml = dot ? '<span class="dot" style="color:'+color+'"></span>' : '';
  return '<button class="chip'+(on?' on':'')+'" onclick="setCh(\''+key+'\')">'+
    dotHtml + esc(name) + '<span class="cnt">'+cnt+'</span></button>';
}
function setCh(k){ activeCh=k; render(); }
function toggleLive(){ liveOnly=!liveOnly; render(); }

/* ---------- Render grid ---------- */
function render(){
  renderFilters();
  var q = (document.getElementById('q').value||'').trim().toLowerCase();
  var grid = document.getElementById('grid');
  var list = DB.ads.filter(function(a){
    if(activeCh!=='all' && a.channel!==activeCh) return false;
    if(liveOnly && a.status!=='live') return false;
    if(q){
      var hay = (a.title+' '+a.src+' '+(a.phone||'')+' '+a.benefit+' '+a.memo+' '+chMeta(a.channel).name).toLowerCase();
      if(hay.indexOf(q)<0) return false;
    }
    return true;
  });
  if(!list.length){
    grid.innerHTML = '<div class="empty"><div class="big">'+
      (DB.ads.length? '조건에 맞는 광고가 없어' : '아직 등록된 광고가 없어')+'</div>'+
      (DB.ads.length? '검색어나 필터를 바꿔봐.' : '편집을 켜고 <b>광고 추가</b>로 첫 광고를 등록해줘.')+'</div>';
    return;
  }
  list.sort(function(x,y){
    var px = isPinned(x)?1:0, py = isPinned(y)?1:0;
    if(px!==py) return py-px;
    if(px) return (pinAt(y)||0) - (pinAt(x)||0);
    return 0;
  });
  grid.innerHTML = list.map(cardHtml).join('');
}
/* 고정은 한 번만 누르면 전체·채널 어디서든 동일하게 적용 */
function isPinned(a){ return !!a.pinAll; }
function pinAt(a){ return a.pinAllAt||0; }
function togglePin(id, ev){
  if(ev){ ev.stopPropagation(); }
  if(!isEditor){ toast('편집 잠금을 먼저 해제해줘'); openPw(); return; }
  var a = DB.ads.find(function(x){return x.id===id;}); if(!a) return;
  var obj = Object.assign({}, a);
  obj.pinAll = !obj.pinAll;
  obj.pinAllAt = obj.pinAll ? Date.now() : 0;
  obj.pinCh = obj.pinAll; obj.pinChAt = obj.pinAllAt;
  if(window.__cloud){
    window.__save(obj).then(function(){ toast(obj.pinAll ? '상단에 고정됨 (전체·채널 공통)' : '고정 해제됨'); })
      .catch(function(e){ toast('실패: '+(e.code||'')); });
  } else {
    var i = DB.ads.findIndex(function(x){return x.id===id;});
    if(i>=0) DB.ads[i]=obj;
    render(); toast(obj.pinAll ? '고정됨' : '고정 해제됨');
  }
}

function cardHtml(a){
  var ch = chMeta(a.channel);
  var vid = a.channel==='youtube' ? ytId(a.yt) : '';
  var preview;
  if(vid){
    preview = '<img class="thumb" src="'+ytThumb(vid)+'" alt="" onerror="this.style.display=\'none\'">'+
      '<div class="play" onclick="playVid(this,\''+vid+'\')"><div class="circle">'+
      '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div>';
  } else if(imgList(a).length){
    var imgs = imgList(a);
    var hint = imgs.length>1 ? (imgs.length+'장 전체 보기') : '전체 보기';
    preview = '<img class="thumb zoomable" src="'+imgs[0]+'" alt="" onclick="openGallery(\''+a.id+'\')">'+
      '<div class="zoom-hint" onclick="openGallery(\''+a.id+'\')">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3M11 8v6M8 11h6"/></svg>'+hint+'</div>';
  } else {
    preview = '<div class="noimg">미리보기 이미지 없음</div>';
  }
  var statusHtml = a.status==='live'
    ? '<div class="status live">● 진행중</div>'
    : '<div class="status ended">종료</div>';
  var benefit = a.benefit ? '<div class="benefit"><div class="lbl">💎 혜택</div><div class="txt">'+esc(a.benefit)+'</div></div>' : '';
  var links = '';
  if(a.link1) links += '<a class="lk" href="'+esc(a.link1)+'" target="_blank" rel="noopener">광고 보기 ↗</a>';
  if(a.link2) links += '<a class="lk grey" href="'+esc(a.link2)+'" target="_blank" rel="noopener">신청서 ↗</a>';
  var memo = a.memo ? '<div class="memo">📌 '+esc(a.memo)+'</div>' : '';
  var phone = a.phone ? '<a class="phoneline" href="tel:'+esc(a.phone.replace(/[^0-9+]/g,''))+'">'+
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L7.9 9.8a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2z"/></svg>'+
    esc(a.phone)+'</a>' : '';
  var per = a.period || periodStr(a.start, a.end, a.status);
  return '<div class="card'+(isPinned(a)?' pinned':'')+'">'+
    '<div class="preview">'+
      '<div class="badges"><span class="ch-badge" style="background:'+ch.color+'">'+esc(ch.name)+'</span>'+
        (isPinned(a)? '<span class="pin-badge">📌 고정</span>' : '')+'</div>'+
      statusHtml + preview +
    '</div>'+
    '<div class="body">'+
      '<div class="src">'+esc(a.src||ch.name)+'</div>'+
      '<div class="title">'+esc(a.title||'(경로 없음)')+'</div>'+
      phone + benefit + memo +
      '<div class="meta">'+
        '<span class="period">🗓 '+esc(per||'-')+'</span>'+
        '<div class="row-actions">'+
          '<button class="icon-btn pin'+(isPinned(a)?' on':'')+'" title="'+(isPinned(a)?'고정 해제':'상단 고정')+'" onclick="togglePin(\''+a.id+'\',event)">'+
            '<svg viewBox="0 0 24 24" fill="'+(isPinned(a)?'currentColor':'none')+'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.8V4h6v6.8l2.4 3.2a1 1 0 0 1-.8 1.6H7.4a1 1 0 0 1-.8-1.6L9 10.8z"/></svg>'+
          '</button>'+
          '<button class="icon-btn" title="수정" onclick="openForm(\''+a.id+'\')">'+
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>'+
          '</button>'+
        '</div>'+
      '</div>'+
      (links? '<div class="links">'+links+'</div>' : '')+
    '</div>'+
  '</div>';
}
function playVid(el, id){
  var wrap = el.parentElement;
  wrap.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&rel=0" '+
    'allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';
}
function imgList(a){ return (a.imgs && a.imgs.length) ? a.imgs : (a.img ? [a.img] : []); }
function openGallery(id){
  var a = DB.ads.find(function(x){return x.id===id;}); if(!a) return;
  var imgs = imgList(a); if(!imgs.length) return;
  galleryImgs = imgs; galleryIdx = 0; showGallery();
  document.getElementById('imgview').classList.add('open');
}
function showGallery(){
  document.getElementById('imgviewImg').src = galleryImgs[galleryIdx] || '';
  var multi = galleryImgs.length > 1;
  document.getElementById('imgPrev').style.display = multi ? '' : 'none';
  document.getElementById('imgNext').style.display = multi ? '' : 'none';
  var c = document.getElementById('imgviewCounter');
  if(multi){ c.style.display=''; c.textContent = (galleryIdx+1)+' / '+galleryImgs.length; }
  else { c.style.display='none'; }
}
function galleryNav(d, ev){
  if(ev) ev.stopPropagation();
  if(galleryImgs.length<2) return;
  galleryIdx = (galleryIdx + d + galleryImgs.length) % galleryImgs.length;
  showGallery();
}
function closeImg(){ document.getElementById('imgview').classList.remove('open'); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---------- Ad form ---------- */
function renderChSeg(){
  document.getElementById('chSeg').innerHTML = DB.channels.map(function(ch){
    return '<button type="button" data-ch="'+ch.key+'" class="'+(formCh===ch.key?'on':'')+'" '+
      'onclick="setFormCh(\''+ch.key+'\')"><span class="cdot" style="background:'+ch.color+'"></span>'+esc(ch.name)+'</button>';
  }).join('');
}
function setFormCh(k){
  formCh=k; renderChSeg();
  document.getElementById('ytField').style.display = k==='youtube' ? '' : 'none';
}
function setFormStatus(s){
  formStatus=s;
  document.querySelectorAll('#stSeg button').forEach(function(b){
    b.classList.toggle('on', b.dataset.st===s);
  });
  var endInput = document.getElementById('f_end');
  var endHint = document.getElementById('endHint');
  if(s==='live'){ endInput.value=''; endInput.disabled=true; endHint.textContent='(진행중 — 비활성)'; }
  else { endInput.disabled=false; endHint.textContent='(선택)'; }
}
document.getElementById('stSeg').addEventListener('click', function(e){
  var b=e.target.closest('button'); if(b) setFormStatus(b.dataset.st);
});
function renderImgDrop(){
  var d=document.getElementById('imgdrop');
  var thumbs = formImgs.map(function(src,i){
    return '<div class="imgthumb"><img src="'+src+'" alt="">'+
      '<button type="button" class="imgdel" title="삭제" onclick="removeImg(event,'+i+')">×</button></div>';
  }).join('');
  d.innerHTML = '<div class="imgthumbs">'+thumbs+
    '<button type="button" class="imgadd" onclick="document.getElementById(\'f_img\').click()">＋<span>추가</span></button>'+
    '</div><input type="file" id="f_img" accept="image/*" multiple style="display:none">';
  d.querySelector('#f_img').addEventListener('change', onImgFiles);
}
function onImgFiles(e){
  var files = Array.prototype.slice.call(e.target.files); if(!files.length) return;
  files.forEach(function(file){
    fileToImg(file, function(data){ formImgs.push(data); renderImgDrop(); });
  });
}
function removeImg(ev, i){ ev.stopPropagation(); formImgs.splice(i,1); renderImgDrop(); }

function openForm(id){
  if(!isEditor){ toast('편집하려면 먼저 잠금을 해제해줘'); openPw(); return; }
  editingId = id || null;
  var a = id ? DB.ads.find(function(x){return x.id===id;}) : null;
  document.getElementById('modalTitle').textContent = a ? '광고 수정' : '광고 추가';
  document.getElementById('delBtn').style.display = a ? '' : 'none';
  formCh = a ? a.channel : (DB.channels[0] ? DB.channels[0].key : 'youtube');
  formStatus = a ? a.status : 'live';
  formImgs = a ? imgList(a).slice() : [];
  renderChSeg(); setFormCh(formCh);
  document.getElementById('f_title').value = a? a.title : '';
  document.getElementById('f_src').value   = a? a.src : '';
  document.getElementById('f_phone').value = a? (a.phone||'') : '';
  document.getElementById('f_yt').value    = a? (a.yt||'') : '';
  document.getElementById('f_benefit').value = a? a.benefit : '';
  document.getElementById('f_start').value = a? (a.start||'') : '';
  document.getElementById('f_end').value   = a? (a.end||'') : '';
  document.getElementById('f_link1').value = a? (a.link1||'') : '';
  document.getElementById('f_link2').value = a? (a.link2||'') : '';
  document.getElementById('f_memo').value  = a? (a.memo||'') : '';
  setFormStatus(formStatus);
  if(a){ document.getElementById('f_end').value = a.end||''; }
  renderImgDrop();
  document.getElementById('overlay').classList.add('open');
}
function closeForm(){ document.getElementById('overlay').classList.remove('open'); }

function saveAd(){
  var start = document.getElementById('f_start').value;
  var end = formStatus==='live' ? '' : document.getElementById('f_end').value;
  var obj = {
    id: editingId || ('a'+Date.now()),
    channel: formCh,
    title: document.getElementById('f_title').value.trim(),
    src: document.getElementById('f_src').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    yt: document.getElementById('f_yt').value.trim(),
    imgs: formImgs,
    benefit: document.getElementById('f_benefit').value.trim(),
    start: start, end: end, status: formStatus,
    period: periodStr(start, end, formStatus),
    link1: document.getElementById('f_link1').value.trim(),
    link2: document.getElementById('f_link2').value.trim(),
    memo: document.getElementById('f_memo').value.trim()
  };
  if(!obj.title && !obj.benefit){ toast('인입경로나 혜택 중 하나는 적어줘'); return; }
  if(editingId){
    var prev = DB.ads.find(function(x){return x.id===editingId;});
    if(prev){
      obj.pinAll = !!prev.pinAll; obj.pinAllAt = prev.pinAllAt||0;
      obj.pinCh  = !!prev.pinCh;  obj.pinChAt  = prev.pinChAt||0;
    }
  }
  if(window.__cloud){
    window.__save(obj).then(function(){ closeForm(); toast('저장됨 · 모두에게 실시간 반영'); })
      .catch(function(e){ toast('저장 실패: '+(e.code||e.message||'')); });
  } else {
    if(editingId){ var i=DB.ads.findIndex(function(x){return x.id===editingId;}); if(i>=0) DB.ads[i]=obj; }
    else { DB.ads.unshift(obj); }
    closeForm(); render(); toast('데모 모드 · 실제 저장은 연결 후');
  }
}
function delAd(){
  if(!editingId) return;
  if(!confirm('이 광고를 삭제할까?')) return;
  if(window.__cloud){
    window.__del(editingId).then(function(){ closeForm(); toast('삭제됨'); })
      .catch(function(e){ toast('삭제 실패: '+(e.code||'')); });
  } else {
    DB.ads = DB.ads.filter(function(x){return x.id!==editingId;});
    closeForm(); render();
  }
}

/* ---------- Channel manager ---------- */
function openChannels(){
  renderChannelList(); renderSwatches();
  document.getElementById('newChName').value='';
  document.getElementById('chOverlay').classList.add('open');
}
function closeChannels(){ document.getElementById('chOverlay').classList.remove('open'); }
function renderChannelList(){
  var c = counts();
  document.getElementById('chList').innerHTML = DB.channels.map(function(ch){
    var used = c[ch.key]||0;
    var right = ch.fixed
      ? '<span class="tag">기본</span>'
      : (used>0
          ? '<span class="usecnt">광고 '+used+'개</span>'
          : '<button class="del" title="삭제" onclick="delChannel(\''+ch.key+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>');
    return '<div class="ch-row"><span class="cdot" style="background:'+ch.color+'"></span>'+
      '<span class="nm">'+esc(ch.name)+'</span>'+
      '<span style="margin-left:auto;display:inline-flex;align-items:center;gap:8px">'+right+'</span></div>';
  }).join('');
}
function renderSwatches(){
  document.getElementById('swatches').innerHTML = SWATCH_COLORS.map(function(col){
    return '<span class="swatch'+(col===newChColor?' on':'')+'" style="background:'+col+'" onclick="pickColor(\''+col+'\')"></span>';
  }).join('');
}
function pickColor(col){ newChColor=col; renderSwatches(); }
function slug(name){
  return 'ch_' + name.replace(/\s+/g,'').toLowerCase().replace(/[^\w가-힣]/g,'') + '_' + Math.random().toString(36).slice(2,6);
}
function addChannel(){
  var name = document.getElementById('newChName').value.trim();
  if(!name){ toast('채널 이름을 입력해줘'); return; }
  if(DB.channels.some(function(c){return c.name===name;})){ toast('이미 있는 채널이야'); return; }
  var newCh = {key:slug(name), name:name, color:newChColor, fixed:false};
  var arr = DB.channels.concat([newCh]);
  if(window.__cloud){
    window.__saveChannels(arr).then(function(){ document.getElementById('newChName').value=''; toast('채널 추가됨'); })
      .catch(function(e){ toast('실패: '+(e.code||'')); });
  } else {
    DB.channels = arr; document.getElementById('newChName').value='';
    renderChannelList(); renderFilters(); toast('데모 · 연결 후 저장');
  }
}
function delChannel(key){
  var ch = chMeta(key);
  if(ch.fixed) return;
  if(!confirm('"'+ch.name+'" 채널을 삭제할까?')) return;
  var arr = DB.channels.filter(function(c){return c.key!==key;});
  if(activeCh===key) activeCh='all';
  if(window.__cloud){
    window.__saveChannels(arr).then(function(){ toast('채널 삭제됨'); })
      .catch(function(e){ toast('실패: '+(e.code||'')); });
  } else {
    DB.channels = arr; renderChannelList(); render(); toast('채널 삭제됨');
  }
}

/* ---------- Edit lock (공용 비밀번호) ---------- */
function applyEditMode(){
  document.body.classList.toggle('is-editor', !!isEditor);
  var b=document.getElementById('editBtn');
  if(isEditor){ b.textContent='✏️ 편집 중 · 종료'; b.classList.add('on'); }
  else { b.textContent='🔓 편집'; b.classList.remove('on'); }
}
function onEditBtn(){
  if(isEditor){
    if(window.__cloud && window.__logout){ window.__logout(); }
    else { isEditor=false; applyEditMode(); }
  } else {
    if(window.__cloud){ openPw(); }
    else { isEditor=true; applyEditMode(); toast('데모 편집 모드'); }
  }
}
function openPw(){
  document.getElementById('pwErr').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('pwOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('pwInput').focus(); }, 50);
}
function closePw(){ document.getElementById('pwOverlay').classList.remove('open'); }
function submitPw(){
  var pw=document.getElementById('pwInput').value;
  if(!pw) return;
  var err=document.getElementById('pwErr'); err.style.display='none';
  if(!window.__login){ err.textContent='아직 클라우드 연결 전이야.'; err.style.display='block'; return; }
  window.__login(pw).then(function(){ closePw(); /* isEditor는 로그인 상태변화로 자동 반영 */ })
    .catch(function(e){ err.textContent='비밀번호가 맞지 않아. 다시 확인해줘.'; err.style.display='block'; });
}

/* ---------- Toast ---------- */
var toastTimer;
function toast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},2600);
}

/* ---------- Bridge (module → app) ---------- */
window.__setAds = function(ads){ DB.ads = ads||[]; render(); };
window.__setChannels = function(chArr){
  if(!chArr || !chArr.length){
    DB.channels = DEFAULT_CHANNELS.map(function(c){return Object.assign({},c);});
  } else {
    var arr = chArr.map(function(c){return Object.assign({},c);});
    DEFAULT_CHANNELS.forEach(function(d){
      if(!arr.some(function(c){return c.key===d.key;})) arr.unshift(Object.assign({},d));
    });
    arr.forEach(function(c){ if(DEFAULT_CHANNELS.some(function(d){return d.key===c.key;})) c.fixed=true; });
    DB.channels = arr;
  }
  render();
  if(document.getElementById('chOverlay').classList.contains('open')) renderChannelList();
};
window.__setEditor = function(v){ isEditor=!!v; applyEditMode(); };
window.__setPresence = function(n){
  var el=document.getElementById('presenceBadge'); if(!el) return;
  if(!n || n<1){ el.className='live-count'; el.innerHTML=''; return; }
  el.className='live-count on';
  el.innerHTML='<span class="pulse"></span>'+n+'명 접속 중';
};
window.__setSync = function(state){
  var el=document.getElementById('syncBadge'); if(!el) return;
  if(state==='connected'){ el.textContent='☁ 실시간 공유'; el.className='sync ok'; }
  else if(state==='error'){ el.textContent='⚠ 연결 오류'; el.className='sync err'; }
  else if(state==='demo'){ el.textContent='연결 전 · 데모(저장 안 됨)'; el.className='sync demo'; }
  else { el.textContent=''; el.className='sync'; }
};
window.__demoSeed = function(){
  DB.channels = DEFAULT_CHANNELS.map(function(c){return Object.assign({},c);});
  DB.ads = SAMPLE.slice();
  render();
};

/* ---------- Boot ---------- */
document.getElementById('q').addEventListener('input', render);
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeForm(); });
document.getElementById('chOverlay').addEventListener('click', function(e){ if(e.target===this) closeChannels(); });
document.getElementById('pwOverlay').addEventListener('click', function(e){ if(e.target===this) closePw(); });
document.getElementById('newChName').addEventListener('keydown', function(e){ if(e.key==='Enter') addChannel(); });
document.getElementById('pwInput').addEventListener('keydown', function(e){ if(e.key==='Enter') submitPw(); });
document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){ closeForm(); closeChannels(); closePw(); closeImg(); }
  if(document.getElementById('imgview').classList.contains('open')){
    if(e.key==='ArrowLeft') galleryNav(-1);
    if(e.key==='ArrowRight') galleryNav(1);
  }
});

applyEditMode();
render();
</script>

<!-- ===================== 실시간 동기화 (Firebase) ===================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* ▼▼▼▼▼  여기 두 곳만 바꾸면 됩니다 (한 번만)  ▼▼▼▼▼ */

// (1) Firebase 콘솔에서 복사한 설정을 그대로 붙여넣기
const firebaseConfig = {
  apiKey: "AIzaSyAOk3O5vt29JuFYdenzFkwaSG8bwPTuliM",
  authDomain: "ads-check-f188a.firebaseapp.com",
  projectId: "ads-check-f188a",
  storageBucket: "ads-check-f188a.firebasestorage.app",
  messagingSenderId: "417174338218",
  appId: "1:417174338218:web:48b96e0cfeb6e44cc36ed3"
};

// (2) 편집용 공용 계정 이메일 (Firebase Authentication에서 만든 그 이메일)
//     비밀번호는 코드에 넣지 않고, 팀에게 따로 알려주면 됩니다.
const EDITOR_EMAIL = "pr@w-network.co.kr";

/* ▲▲▲▲▲  여기까지  ▲▲▲▲▲ */

const configured = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("PASTE") < 0;

if(!configured){
  // 아직 설정 전 → 데모 모드 (로컬에서 미리보기만, 저장 안 됨)
  window.__cloud = false;
  window.__setSync("demo");
  window.__demoSeed();
} else {
  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);
  window.__cloud = true;
  window.__setSync("connected");

  // 광고 실시간 구독
  onSnapshot(collection(db, "ads"), (snap)=>{
    const ads = [];
    snap.forEach((d)=> ads.push(Object.assign({ id: d.id }, d.data())));
    ads.sort((a,b)=> (a.id < b.id ? 1 : -1)); // 최근 추가가 위로
    window.__setAds(ads);
  }, ()=> window.__setSync("error"));

  // 채널 설정 실시간 구독
  onSnapshot(doc(db, "config", "main"), (d)=>{
    const data = d.exists() ? d.data() : null;
    window.__setChannels(data && data.channels ? data.channels : null);
  });

  // 로그인 상태 → 편집 권한
  onAuthStateChanged(auth, (user)=> window.__setEditor(!!user));

  // 쓰기 함수 (편집 로그인 되어 있어야 규칙 통과)
  window.__save = (obj)=>{
    const { id } = obj; const data = Object.assign({}, obj); delete data.id;
    return setDoc(doc(db, "ads", id), data);
  };
  window.__del = (id)=> deleteDoc(doc(db, "ads", id));
  window.__saveChannels = (channels)=> setDoc(doc(db, "config", "main"), { channels });
  window.__login  = (pw)=> signInWithEmailAndPassword(auth, EDITOR_EMAIL, pw);
  window.__logout = ()=> signOut(auth);

  /* ---- 접속 인원(실시간) ---- */
  const SID = Math.random().toString(36).slice(2) + Date.now().toString(36);
  const myPresence = doc(db, "presence", SID);
  const ALIVE = 90000;    // 90초 안에 신호가 있으면 접속 중
  const BEAT  = 25000;    // 25초마다 신호

  const beat = ()=> setDoc(myPresence, { t: Date.now() }).catch(()=>{});
  beat();
  setInterval(beat, BEAT);
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) beat(); });

  onSnapshot(collection(db, "presence"), (snap)=>{
    const now = Date.now(); let n = 0; const stale = [];
    snap.forEach((d)=>{
      const t = (d.data() || {}).t || 0;
      if(now - t < ALIVE) n++;
      else if(now - t > 600000) stale.push(d.id);   // 10분 넘은 찌꺼기
    });
    window.__setPresence(n);
    if(stale.length && Math.random() < 0.25){
      stale.slice(0,5).forEach((id)=> deleteDoc(doc(db,"presence",id)).catch(()=>{}));
    }
  }, ()=>{});

  const bye = ()=>{ try{ deleteDoc(myPresence); }catch(e){} };
  window.addEventListener("pagehide", bye);
  window.addEventListener("beforeunload", bye);
}
</script>
</body>
